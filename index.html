<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeadlyMc Store</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌌 PARTICLES -->
<canvas id="particles"></canvas>

<!-- ☁️ CLOUDS -->
<div class="clouds"></div>

<!-- 🔝 TOP BAR -->
<div class="top-bar">
  <span>Server IP: deadlymc.boysonly.fun</span>
  <button onclick="copyIP()" id="copyBtn">Copy IP</button>
</div>

<!-- 🔥 WELCOME -->
<section class="welcome" id="home">
  <h1>Welcome To DeadlyMc Store</h1>
  <button onclick="scrollToStore()">VIEW STORE</button>
</section>

<!-- 🔥 STORE -->
<section id="storeSection">
  <h2 class="title">STORE</h2>
  <div class="container" id="store"></div>
</section>

<!-- 🔥 MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="itemName"></h3>
    <p>Go to Discord → Support → Make Ticket</p>

    <a href="https://discord.gg/JMPbC9KAd3" target="_blank" class="buy-discord">
      BUY ON DISCORD
    </a>

    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
