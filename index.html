<!DOCTYPE html>

<head>

<body>

<!-- WELCOME PAGE -->
<section class="welcome">

    <a href="https://discord.gg/JMPbC9KAd3" target="_blank" class="buy-discord">
      BUY ON DISCORD
    </a>

    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<div class="info">
  Server IP: deadlymc.boysonly.fun<br>
  Port: 25565
</div>

<script src="script.js"></script>
